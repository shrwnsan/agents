name: Sync Upstream

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Name to sync (from .upstream.yml), or "all"'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agents hub
        uses: actions/checkout@v5

      - name: Read config and sync
        env:
          TARGET_FILTER: ${{ inputs.target }}
        run: |
          # Use .upstream.yml if it exists, fall back to legacy .upstream-skills.yml
          CONFIG_FILE=".upstream.yml"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE=".upstream-skills.yml"
          fi

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::No upstream config found (.upstream.yml or .upstream-skills.yml)"
            exit 1
          fi

          echo "Using config: $CONFIG_FILE"

          python3 << 'PYEOF'
          import yaml, json, subprocess, os, shutil
          from datetime import datetime, timezone

          target_filter = os.environ.get("TARGET_FILTER", "all")

          # Load config
          config_file = os.environ.get("CONFIG_FILE", ".upstream.yml")
          with open(config_file) as f:
              config = yaml.safe_load(f)

          # Collect all entries (skills + recipes) with their kind
          entries = []
          for entry in config.get("skills", []):
              entries.append({**entry, "kind": "skill"})
          for entry in config.get("recipes", []):
              entries.append({**entry, "kind": "recipe"})

          if target_filter != "all":
              entries = [e for e in entries if e["name"] == target_filter]
              if not entries:
                  print(f"::error::Target '{target_filter}' not found in {config_file}")
                  exit(1)

          # Load existing manifest
          manifest_path = ".upstream-manifest.json"
          manifest = {}
          if os.path.isfile(manifest_path):
              with open(manifest_path) as f:
                  manifest = json.load(f)
          if "entries" not in manifest:
              manifest["entries"] = {}

          has_changes = False
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          for entry in entries:
              name = entry["name"]
              repo = entry["repo"]
              path = entry["path"]
              entry_kind = entry["kind"]
              single_file = entry.get("file")

              # Determine local destination
              dst_base = "skills" if entry_kind == "skill" else "recipes"
              dst = os.path.join(dst_base, name)

              print(f"\n{'='*40}")
              print(f"Syncing: {name} ({entry_kind}) from {repo} ({path})")
              print(f"{'='*40}")

              # Clone upstream (sparse)
              upstream_dir = f"/tmp/upstream-{name}"
              if os.path.exists(upstream_dir):
                  shutil.rmtree(upstream_dir)
              subprocess.run([
                  "git", "clone", "--depth", "1", "--sparse",
                  f"https://github.com/{repo}.git", upstream_dir
              ], check=True, capture_output=True)
              subprocess.run(
                  ["git", "sparse-checkout", "set", path],
                  cwd=upstream_dir, check=True, capture_output=True
              )

              # Capture upstream commit hash
              result = subprocess.run(
                  ["git", "rev-parse", "HEAD"],
                  cwd=upstream_dir, check=True, capture_output=True, text=True
              )
              commit_sha = result.stdout.strip()

              # Update manifest entry (always, even if no file changes)
              record = {
                  "kind": entry_kind,
                  "repo": repo,
                  "path": path,
                  "commit": commit_sha,
                  "synced_at": now,
              }
              if single_file:
                  record["file"] = single_file

              # If single_file is set, resolve src to that specific file
              if single_file:
                  src = os.path.join(upstream_dir, path, single_file)
              else:
                  src = os.path.join(upstream_dir, path)

              if single_file:
                  if not os.path.isfile(src):
                      print(f"::error::File '{path}/{single_file}' not found in {repo}")
                      shutil.rmtree(upstream_dir)
                      exit(1)

                  # Ensure destination directory exists
                  os.makedirs(dst_base, exist_ok=True)

                  # Diff if file already exists
                  if os.path.isfile(dst):
                      result = subprocess.run(
                          ["diff", "-u", dst, src],
                          capture_output=True, text=True
                      )
                      if result.stdout:
                          print(f"\n=== Diff ({name}) ===")
                          print(result.stdout)
                      else:
                          print(f"\nNo changes for {name}")
                          manifest["entries"][name] = record
                          shutil.rmtree(upstream_dir)
                          continue

                  # Copy single file
                  shutil.copy2(src, dst)
                  print(f"Updated: {name} -> {dst}")
                  has_changes = True
              else:
                  if not os.path.isdir(src):
                      print(f"::error::Path '{path}' not found in {repo}")
                      shutil.rmtree(upstream_dir)
                      exit(1)

                  # Show files to sync
                  for root, dirs, files in os.walk(src):
                      for file in files:
                          rel = os.path.relpath(os.path.join(root, file), src)
                          print(f"  {rel}")

                  # Diff if directory already exists
                  if os.path.isdir(dst):
                      result = subprocess.run(
                          ["diff", "-ru", dst, src],
                          capture_output=True, text=True
                      )
                      if result.stdout:
                          print(f"\n=== Diff ({name}) ===")
                          print(result.stdout)
                      else:
                          print(f"\nNo changes for {name}")
                          manifest["entries"][name] = record
                          shutil.rmtree(upstream_dir)
                          continue

                  # Copy directory
                  if os.path.isdir(dst):
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
                  print(f"Updated: {name} -> {dst}")
                  has_changes = True

              manifest["entries"][name] = record
              shutil.rmtree(upstream_dir)

          # Write manifest
          manifest["generated_at"] = now
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          print(f"\nManifest: {len(manifest['entries'])} entries, changes={has_changes}")
          PYEOF

      - name: Commit and push
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            CHANGED=$(git diff --cached --stat | tail -1)
            TARGETS=$(git diff --cached --name-only | grep -E '^(skills|recipes)/' | cut -d/ -f2 | sort -u | paste -sd, -)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: update upstream skills and recipes

            Updated: ${TARGETS}
            ${CHANGED}"
            git push
            echo "Pushed: ${TARGETS}"
          else
            echo "Everything already up to date"
          fi

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/upstream-*
